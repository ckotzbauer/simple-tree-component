name: create-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: true

permissions:
  actions: read
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-release-nodejs.yml@187b42cc2ca9bc9257d6e72bb1c1be730f1d0565 # 0.56.0
    with:
      version: ${{ github.event.inputs.version }}
      build-commands: |
        npm ci
        npm run build
        npm run build:docs
        npm test
      artifact-path: dist/
      npm: true
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
      pat: ${{ secrets.REPO_ACCESS_TOKEN }}
      npm-token: ${{ secrets.NPM_TOKEN }}

  deploy-docs:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy docs
        uses: benc-uk/workflow-dispatch@31e2b3319479a63f0ab15bf800eff9e913504e26 # v1.3
        with:
          workflow: deploy-docs
          ref: main
          token: ${{ secrets.REPO_ACCESS_TOKEN }}