name: build

on:
  push:
    branches:
      - '**'
  pull_request: {}

permissions:
  actions: read
  contents: read

jobs:
  build:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-build-test.yml@127bf24eda432e06ca81296442031074473d58f4 # 0.55.9
    with:
      install-node: true
      build-commands: |
        npm ci
        npm run build
      test-commands: npm test
      report-coverage: true
      coverage-file: ./coverage/lcov.info

  docs:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-build-test.yml@127bf24eda432e06ca81296442031074473d58f4 # 0.55.9
    with:
      install-node: true
      build-commands: |
        npm ci
        npm run build:docs

  lint:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-lint.yml@127bf24eda432e06ca81296442031074473d58f4 # 0.55.9
    with:
      install-node: true
      lint-commands: |
        npm ci
        npm run lint