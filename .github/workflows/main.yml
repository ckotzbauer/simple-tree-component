name: build

on:
  push:
    branches:
      - '**'
  pull_request: {}

permissions:
  actions: read
  contents: read

jobs:
  build:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-build-test.yml@ec37c041a36a69320d9cb6a4c41c89f84f7e02cd # 0.55.1
    with:
      install-node: true
      build-commands: |
        npm ci
        npm run build
      test-commands: npm test
      report-coverage: true
      coverage-file: ./coverage/lcov.info

  docs:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-build-test.yml@ec37c041a36a69320d9cb6a4c41c89f84f7e02cd # 0.55.1
    with:
      install-node: true
      build-commands: |
        npm ci
        npm run build:docs

  lint:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-lint.yml@ec37c041a36a69320d9cb6a4c41c89f84f7e02cd # 0.55.1
    with:
      install-node: true
      lint-commands: |
        npm ci
        npm run lint
