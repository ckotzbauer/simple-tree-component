name: build

on:
  push:
    branches:
      - '**'
  pull_request: {}

permissions:
  actions: read
  contents: read

jobs:
  build:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-build-test.yml@187b42cc2ca9bc9257d6e72bb1c1be730f1d0565 # 0.56.0
    with:
      install-node: true
      build-commands: |
        npm ci
        npm run build
      test-commands: npm test
      report-coverage: true
      coverage-file: ./coverage/lcov.info

  docs:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-build-test.yml@187b42cc2ca9bc9257d6e72bb1c1be730f1d0565 # 0.56.0
    with:
      install-node: true
      build-commands: |
        npm ci
        npm run build:docs

  lint:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-lint.yml@187b42cc2ca9bc9257d6e72bb1c1be730f1d0565 # 0.56.0
    with:
      install-node: true
      lint-commands: |
        npm ci
        npm run lint